name: Build & Push (Quay) - Keycloak

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
    paths:
      - 'docker/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag da imagem (ex: dev, uat, prd, v1.0.0)'
        required: false
        default: 'dev'

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      REGISTRY: quay.io
      ORG: ${{ secrets.QUAY_ORG }}
      IMAGE_NAME: rhbk-keycloak-custom
      CONTEXT_DIR: docker
      # Prioridade: input manual > tag Git > branch > dev
      TAG: ${{ github.event.inputs.tag || (startsWith(github.ref, 'refs/tags/') && github.ref_name) || github.ref_name || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Validate variables
        run: |
          if [ -z "${ORG}" ]; then
            echo "ERROR: QUAY_ORG is empty. Configure secrets.QUAY_ORG with your Quay namespace (ex: thiagobotelho)."
            exit 1
          fi
          echo "Image: ${REGISTRY}/${ORG}/${IMAGE_NAME}:${TAG}"

      # 🔐 Necessário para puxar a base image do RHBK
      - name: Login registry.redhat.io
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: registry.redhat.io
          username: ${{ secrets.RHDN_USERNAME }}
          password: ${{ secrets.RHDN_PASSWORD }}

      # 🔐 Push no Quay
      - name: Login Quay.io
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build & Push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: ${{ env.CONTEXT_DIR }}
          file: ${{ env.CONTEXT_DIR }}/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}
            ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
