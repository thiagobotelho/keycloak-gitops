# Keycloak upstream 26.6.4, reconciliado pelo Operator oficial da mesma versão.
apiVersion: k8s.keycloak.org/v2beta1
kind: Keycloak
metadata:
  name: keycloak-ENV
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  image: quay.io/thiagobotelho/rhbk-keycloak-custom:26.6.4-pyroscope-2.8.0-theme-1.2.5
  instances: 1
  startOptimized: true

  # Continuous profiling para o Grafana Profiles Drilldown.
  # A imagem customizada carrega /opt/keycloak/pyroscope.jar.
  env:
    - name: JAVA_OPTS_APPEND
      value: "-javaagent:/opt/keycloak/pyroscope.jar"
    - name: PYROSCOPE_AGENT_ENABLED
      value: "true"
    - name: PYROSCOPE_APPLICATION_NAME
      value: keycloak-ENV-service
    - name: PYROSCOPE_SERVER_ADDRESS
      value: http://pyroscope.pyroscope.svc:4040
    - name: PYROSCOPE_FORMAT
      value: jfr
    - name: PYROSCOPE_PROFILER_EVENT
      value: wall
    - name: PYROSCOPE_PROFILER_ALLOC
      value: 512k
    - name: PYROSCOPE_PROFILER_LOCK
      value: 10ms
    - name: PYROSCOPE_PROFILING_INTERVAL
      value: 10ms
    - name: PYROSCOPE_UPLOAD_INTERVAL
      value: 15s
    - name: PYROSCOPE_LABELS
      value: service_name=keycloak-ENV-service,service_namespace=keycloak-ENV,namespace=keycloak-ENV,deployment_environment_name=crc

  # Recursos conservadores para CRC; produção exige sizing por carga.
  resources:
    requests:
      cpu: 500m
      memory: 768Mi
    limits:
      cpu: "2"
      memory: 1536Mi

  # HTTP fica restrito ao cluster; TLS termina no Route edge.
  http:
    httpEnabled: true
    httpPort: 8080
    serviceHttpPort: 8080
  ingress:
    enabled: false
  hostname:
    hostname: keycloak-ENV.apps-crc.testing
    strict: true
  proxy:
    headers: xforwarded

  db:
    vendor: postgres
    host: postgres-db
    database: keycloak
    usernameSecret:
      name: keycloak-db-secret
      key: username
    passwordSecret:
      name: keycloak-db-secret
      key: password

  # OTel compartilhado para traces; logs/métricas OTel permanecem opt-in.
  telemetry:
    endpoint: http://otel-collector-collector.observability.svc:4317
    protocol: grpc
    serviceName: keycloak-ENV
    resourceAttributes:
      deployment.environment.name: crc
  tracing:
    enabled: true
    compression: gzip
    samplerType: traceidratio
    samplerRatio: 0.2

  features:
    enabled:
      - opentelemetry
      - user-event-metrics

  # Tags limitadas ao realm evitam cardinalidade explosiva.
  additionalOptions:
    - name: metrics-enabled
      value: "true"
    - name: health-enabled
      value: "true"
    - name: event-metrics-user-enabled
      value: "true"
    - name: event-metrics-user-events
      value: login,logout,refresh_token
    - name: event-metrics-user-tags
      value: realm
    - name: http-metrics-histograms-enabled
      value: "true"
    - name: cache-metrics-histograms-enabled
      value: "true"
    - name: http-metrics-slos
      value: 5,10,25,50,250,500,1000,2500,5000,10000
    - name: http-access-log-enabled
      value: "true"
    - name: http-access-log-exclude
      value: /health/.*|/metrics

  serviceMonitor:
    enabled: false

  readinessProbe:
    periodSeconds: 10
    failureThreshold: 6
  livenessProbe:
    periodSeconds: 10
    failureThreshold: 3
  startupProbe:
    periodSeconds: 5
    failureThreshold: 60
